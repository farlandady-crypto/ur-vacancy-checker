name: UR Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# ⭐ 防止并发执行（关键！）
concurrency:
  group: ur-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python monitor.py

      - name: Commit state.json (safe commit)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add state.json

          # 如果没有变化，直接退出
          if git diff --cached --quiet; then
            echo "No changes in state.json"
            exit 0
          fi

          git commit -m "Update state.json [skip ci]"

          # ⭐ 防止冲突（关键优化）
          git pull --rebase origin main || true

          # 如果还是冲突，强制以本地为准
          git push || (git push --force-with-lease && echo "force-pushed")
