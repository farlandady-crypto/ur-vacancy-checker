name: UR Vacancy Checker

on:
  schedule:
    # 修正1：UTC 1-11点 = 日本 10-20点
    # 修正2：改为每5分钟一次
    - cron: '*/5 1-11 * * *'  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-vacancy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Setup Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        echo "CHROME_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run vacancy checker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        mkdir -p data
        python -m src.main
        
    - name: Commit and push status
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || git commit -m "Update vacancy status [skip ci]"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
      continue-on-error: true
